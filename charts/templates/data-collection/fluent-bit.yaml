{{- if .Values.dataCollection.fluentBit.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "mlops-agent-stack.fullname" . }}-fluent-bit
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
    component: fluent-bit
spec:
  selector:
    matchLabels:
      {{- include "mlops-agent-stack.selectorLabels" . | nindent 6 }}
      component: fluent-bit
  template:
    metadata:
      labels:
        {{- include "mlops-agent-stack.selectorLabels" . | nindent 8 }}
        component: fluent-bit
    spec:
      serviceAccountName: {{ include "mlops-agent-stack.serviceAccountName" . }}-fluent-bit
      containers:
      - name: fluent-bit
        image: "{{ .Values.dataCollection.fluentBit.image.repository }}:{{ .Values.dataCollection.fluentBit.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 2020
          protocol: TCP
        env:
        - name: FLUENT_CONF
          value: "fluent-bit.conf"
        - name: FLUENT_OPT
          value: ""
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: etcmachineid
          mountPath: /etc/machine-id
          readOnly: true
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
      volumes:
      - name: config
        configMap:
          name: {{ include "mlops-agent-stack.fullname" . }}-fluent-bit-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: etcmachineid
        hostPath:
          path: /etc/machine-id
          type: File
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      - operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mlops-agent-stack.fullname" . }}-fluent-bit-config
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
    component: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail    On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Annotations         Off

    [FILTER]
        Name                grep
        Match               kube.*
        Regex               $log (?:ERROR|WARN|FATAL|Exception|Error)

    {{- if .Values.dataCollection.fluentBit.config.outputs.loki.enabled }}
    [OUTPUT]
        Name                 loki
        Match                *
        Host                 {{ include "mlops-agent-stack.fullname" . }}-loki
        Port                 3100
        Labels               job=fluent-bit
        Auto_Kubernetes_Labels on
    {{- end }}

    {{- if .Values.dataCollection.fluentBit.config.outputs.elasticsearch.enabled }}
    [OUTPUT]
        Name                 es
        Match                *
        Host                 elasticsearch
        Port                 9200
        Index                kubernetes_cluster
        Type                 _doc
    {{- end }}

  parsers.conf: |
    [PARSER]
        Name         cri
        Format       regex
        Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name         json
        Format       json
        Time_Key     time
        Time_Format  %d/%b/%Y:%H:%M:%S %z
{{- end }}