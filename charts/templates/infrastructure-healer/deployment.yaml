{{- if .Values.infrastructureHealer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mlops-agent-stack.fullname" . }}-infrastructure-healer
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
    component: infrastructure-healer
spec:
  replicas: {{ .Values.infrastructureHealer.replicaCount }}
  selector:
    matchLabels:
      {{- include "mlops-agent-stack.selectorLabels" . | nindent 6 }}
      component: infrastructure-healer
  template:
    metadata:
      labels:
        {{- include "mlops-agent-stack.selectorLabels" . | nindent 8 }}
        component: infrastructure-healer
    spec:
      serviceAccountName: {{ include "mlops-agent-stack.serviceAccountName" . }}-infra-healer
      containers:
      - name: infrastructure-healer
        image: "{{ .Values.global.imageRegistry }}{{ .Values.infrastructureHealer.image.repository }}:{{ .Values.infrastructureHealer.image.tag }}"
        imagePullPolicy: {{ .Values.infrastructureHealer.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: RECONCILE_INTERVAL
          value: "{{ .Values.infrastructureHealer.config.reconcileInterval }}"
        - name: DRY_RUN
          value: "{{ .Values.infrastructureHealer.config.dryRun }}"
        - name: MAX_ACTIONS_PER_HOUR
          value: "{{ .Values.infrastructureHealer.config.maxActionsPerHour }}"
        volumeMounts:
        - name: config
          mountPath: /etc/infrastructure-healer
        resources:
          {{- toYaml .Values.infrastructureHealer.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: {{ include "mlops-agent-stack.fullname" . }}-infrastructure-healer-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}