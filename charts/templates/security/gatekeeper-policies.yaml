{{- if and .Values.security.gatekeeper.enabled (not .Values.testing.enabled) }}
---
# Constraint Template for Required Security Context
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srequiredsecuritycontext
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredSecurityContext
      validation:
        type: object
        properties:
          runAsNonRoot:
            type: boolean
          runAsUser:
            type: object
            properties:
              min:
                type: integer
              max:
                type: integer
          allowPrivilegeEscalation:
            type: boolean
          requiredDropCapabilities:
            type: array
            items:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredsecuritycontext

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.runAsNonRoot
          msg := "Container must run as non-root user"
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.allowPrivilegeEscalation
          msg := "Container must not allow privilege escalation"
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          required := input.parameters.requiredDropCapabilities
          provided := container.securityContext.capabilities.drop
          missing := required[_]
          not missing in provided
          msg := sprintf("Container must drop capability %v", [missing])
        }

---
# Constraint for MLOps workloads
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredSecurityContext
metadata:
  name: mlops-security-context
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces: [{{ include "mlops-agent-stack.namespace" . | quote }}]
  parameters:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    requiredDropCapabilities:
      - "ALL"

---
# Constraint Template for Image Security
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8simagesecurity
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
spec:
  crd:
    spec:
      names:
        kind: K8sImageSecurity
      validation:
        type: object
        properties:
          allowedRegistries:
            type: array
            items:
              type: string
          requireDigests:
            type: boolean
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8simagesecurity

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not starts_with(container.image, input.parameters.allowedRegistries[_])
          msg := sprintf("Container image %v is not from allowed registry", [container.image])
        }

        violation[{"msg": msg}] {
          input.parameters.requireDigests
          container := input.review.object.spec.containers[_]
          not contains(container.image, "@sha256:")
          msg := sprintf("Container image %v must use digest instead of tag", [container.image])
        }

---
# Image Security Constraint
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sImageSecurity
metadata:
  name: mlops-image-security
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces: [{{ include "mlops-agent-stack.namespace" . | quote }}]
  parameters:
    allowedRegistries:
      {{- range .Values.security.gatekeeper.allowedRegistries }}
      - {{ . | quote }}
      {{- end }}
    requireDigests: {{ .Values.security.gatekeeper.requireDigests }}

---
# Constraint Template for Resource Limits
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srequiredresources
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredResources
      validation:
        type: object
        properties:
          limits:
            type: array
            items:
              type: string
          requests:
            type: array
            items:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredresources

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          required := input.parameters.limits
          required_limit := required[_]
          not container.resources.limits[required_limit]
          msg := sprintf("Container must specify %v limit", [required_limit])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          required := input.parameters.requests
          required_request := required[_]
          not container.resources.requests[required_request]
          msg := sprintf("Container must specify %v request", [required_request])
        }

---
# Resource Requirements Constraint
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResources
metadata:
  name: mlops-resource-requirements
  labels:
    {{- include "mlops-agent-stack.labels" . | nindent 4 }}
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces: [{{ include "mlops-agent-stack.namespace" . | quote }}]
  parameters:
    limits: ["memory", "cpu"]
    requests: ["memory", "cpu"]

{{- end }}