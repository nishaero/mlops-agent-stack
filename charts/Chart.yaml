apiVersion: v2
name: mlops-agent-stack
description: A production-grade, cloud-agnostic AI agent cluster for Kubernetes
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - mlops
  - ai
  - kubernetes
  - monitoring
  - automation
  - gitops
home: https://github.com/nishaero/mlops-agent-stack
sources:
  - https://github.com/nishaero/mlops-agent-stack
maintainers:
  - name: Nishant Ravi
    email: nishant@example.com
dependencies:
  - name: prometheus
    version: "25.8.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: loki
    version: "5.41.4"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: opentelemetry-collector
    version: "0.81.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    condition: opentelemetry.enabled
  - name: argo-workflows
    version: "0.40.8"
    repository: "https://argoproj.github.io/argo-helm"
    condition: argoWorkflows.enabled
  - name: flux2
    version: "2.12.1"
    repository: "https://fluxcd-community.github.io/helm-charts"
    condition: flux.enabled
annotations:
  category: MLOps
  licenses: MIT