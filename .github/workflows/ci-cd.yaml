name: MLOps Agent Stack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest black isort mypy
        find operators -name requirements.txt -exec pip install -r {} \;
    
    - name: Lint with flake8
      run: |
        flake8 operators --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 operators --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: black --check operators
    
    - name: Import sort check
      run: isort --check-only operators
    
    - name: Type check with mypy
      run: ./scripts/run-mypy.sh
    
    - name: Run tests
      run: |
        pytest operators -v

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run Checkov IaC scanner
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: kubernetes,dockerfile

  build-images:
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [ai-engine, infrastructure-healer, code-autofix]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: operators/${{ matrix.component }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  helm-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Helm lint
      run: |
        helm dependency update charts
        helm lint charts
    
    - name: Helm template test
      run: |
        helm template mlops-agent-stack charts --values charts/values.yaml

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: [build-images, helm-test]
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to staging
      run: |
        helm upgrade --install mlops-agent-stack-staging charts \
          --namespace mlops-staging \
          --create-namespace \
          --values charts/values.yaml \
          --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ \
          --set aiEngine.image.tag=${{ github.sha }} \
          --set infrastructureHealer.image.tag=${{ github.sha }} \
          --set codeAutofix.image.tag=${{ github.sha }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [build-images, helm-test]
    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to production
      run: |
        helm upgrade --install mlops-agent-stack charts \
          --namespace mlops-production \
          --create-namespace \
          --values charts/values.yaml \
          --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ \
          --set aiEngine.image.tag=${{ github.sha }} \
          --set infrastructureHealer.image.tag=${{ github.sha }} \
          --set codeAutofix.image.tag=${{ github.sha }} \
          --atomic \
          --timeout=600s