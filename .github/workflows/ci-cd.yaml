name: MLOps Agent Stack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov black isort mypy bandit safety types-PyYAML
        find operators -name requirements.txt -exec pip install -r {} \;
    
    - name: Lint with flake8
      run: |
        flake8 operators --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 operators --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: black --check operators
    
    - name: Import sort check
      run: isort --check-only operators
    
    - name: Type check with mypy
      run: ./scripts/run-mypy.sh
    
    - name: Security check with bandit
      run: bandit -r operators -f json -o bandit-report.json || true
    
    - name: Dependency vulnerability check
      run: safety check --json --output safety-report.json || true
    
    - name: Run tests with coverage
      run: |
        pytest operators -v --cov=operators --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner in repo mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run Checkov IaC scanner
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: kubernetes,dockerfile,secrets
        output_format: sarif
        output_file_path: checkov-results.sarif
    
    - name: Upload Checkov results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: checkov-results.sarif
    
    - name: Run Semgrep security scanner
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/python
        generateSarif: "1"
    
    - name: Upload Semgrep results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: semgrep.sarif

  build-images:
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [ai-engine, infrastructure-healer, code-autofix]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{date 'YYYYMMDD'}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: operators/${{ matrix.component }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          VERSION=${{ steps.meta.outputs.version }}
    
    - name: Sign container image with Cosign
      uses: sigstore/cosign-installer@v3
    
    - name: Sign the published Docker image
      env:
        COSIGN_EXPERIMENTAL: 1
      run: |
        cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}@${{ steps.meta.outputs.digest }}
    
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}@${{ steps.meta.outputs.digest }}
        format: spdx-json
        output-file: sbom-${{ matrix.component }}.spdx.json
    
    - name: Scan image with Grype
      uses: anchore/scan-action@v3
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}@${{ steps.meta.outputs.digest }}
        fail-build: true
        severity-cutoff: high

  helm-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Create kind cluster
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: test-cluster
    
    - name: Helm dependency update
      run: |
        helm dependency update charts
    
    - name: Helm lint
      run: |
        helm lint charts
    
    - name: Helm template test
      run: |
        helm template mlops-agent-stack charts \
          --values charts/values.yaml \
          --set global.environment=test \
          --set testing.enabled=true
    
    - name: Install chart in kind cluster
      run: |
        helm install mlops-agent-stack charts \
          --values charts/values.yaml \
          --set global.environment=test \
          --set aiEngine.image.tag=test \
          --set infrastructureHealer.image.tag=test \
          --set codeAutofix.image.tag=test \
          --wait --timeout=600s
    
    - name: Run Helm tests
      run: |
        helm test mlops-agent-stack --timeout=300s
    
    - name: Check deployment status
      run: |
        kubectl get pods -o wide
        kubectl get services
        kubectl describe deployment

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: [build-images, helm-test]
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to staging
      run: |
        helm upgrade --install mlops-agent-stack-staging charts \
          --namespace mlops-staging \
          --create-namespace \
          --values charts/values.yaml \
          --values environments/staging-values.yaml \
          --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ \
          --set aiEngine.image.tag=${{ github.sha }} \
          --set infrastructureHealer.image.tag=${{ github.sha }} \
          --set codeAutofix.image.tag=${{ github.sha }} \
          --wait --timeout=600s
    
    - name: Run integration tests
      run: |
        helm test mlops-agent-stack-staging -n mlops-staging --timeout=600s
    
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: "Staging deployment ${{ job.status }} for commit ${{ github.sha }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  security-compliance:
    needs: [build-images]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run CIS Kubernetes Benchmark
      run: |
        # This would run CIS benchmark tests
        echo "Running CIS Kubernetes Benchmark..."
    
    - name: NIST compliance check
      run: |
        # This would run NIST compliance checks
        echo "Running NIST compliance checks..."
    
    - name: Generate compliance report
      run: |
        echo "Generating compliance report..."

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [build-images, helm-test, security-compliance]
    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Configure kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to production
      run: |
        helm upgrade --install mlops-agent-stack charts \
          --namespace mlops-production \
          --create-namespace \
          --values charts/values.yaml \
          --values environments/prod-values.yaml \
          --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ \
          --set aiEngine.image.tag=${{ github.sha }} \
          --set infrastructureHealer.image.tag=${{ github.sha }} \
          --set codeAutofix.image.tag=${{ github.sha }} \
          --atomic \
          --timeout=600s
    
    - name: Run production smoke tests
      run: |
        helm test mlops-agent-stack -n mlops-production --timeout=300s
    
    - name: Create GitHub release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Automated release from commit ${{ github.sha }}
          
          ## Changes
          ${{ github.event.head_commit.message }}
          
          ## Images
          - AI Engine: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-engine:${{ github.sha }}
          - Infrastructure Healer: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/infrastructure-healer:${{ github.sha }}
          - Code Autofix: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/code-autofix:${{ github.sha }}
        draft: false
        prerelease: false
    
    - name: Notify production deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: "🚀 Production deployment ${{ job.status }} for v${{ github.run_number }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}